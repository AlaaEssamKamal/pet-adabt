<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Adoption</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
    <div class="container">
        
        <!-- Text -->
        <div class="text">
            <h1>
                Find Your <span>Forever</span><br> Friend
            </h1>
            <p>
                At Paw Haven, we believe every animal deserves a sanctuary. 
                Our mission is to connect loving families with pets seeking 
                a second chance at happiness.
            </p>

            <div class="buttons">
                <button class="btn primary">Adopt Now</button>
                <button class="btn secondary">Our Process</button>
            </div>
        </div>

        <!-- Image -->
        <div class="image">
            <img src="pexels-alex-jaison-1690209427-29357039 (1).jpg" alt="Pets">

            <div class="badge">
                <span>❤️</span>
                <div>
                    <small>SAFE & SOUND</small>
                    <p>1,200+ Rescued</p>
                </div>
            </div>
        </div>

    </div>
</section>

<script src="script.js"></script>
</body>
</html>
